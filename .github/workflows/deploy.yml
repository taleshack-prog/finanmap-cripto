name: CI/CD - FinanMap Cripto

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm install
      - run: npm run build
      - run: npm test --if-present

  test-ga-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ga-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --if-present || echo "Sem testes ainda"

  build-docker:
    needs: [test-backend, test-ga-engine]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker-compose build
      - run: echo "✅ Build Docker bem-sucedido"

